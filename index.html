<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />

  <meta name="robots" content="index, follow" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://appliedaifromscratch.com/" />
  <meta property="og:title" content="Applied AI From Scratch" />
  <meta property="og:description" content="The applied AI engineering curriculum. 13 phases, ~165 lessons. Build production AI systems from scratch — RAG, agents, evals, observability, security, and the FDE skillset." />
  <meta property="og:image" content="https://appliedaifromscratch.com/og-image.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Applied AI From Scratch" />
  <meta name="twitter:description" content="The applied AI engineering curriculum. 13 phases, ~165 lessons. Build production AI systems from scratch — RAG, agents, evals, observability, security, and the FDE skillset." />
  <meta name="twitter:image" content="https://appliedaifromscratch.com/og-image.png" />

  <!-- Structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Course",
    "name": "Applied AI From Scratch",
    "description": "The applied AI engineering curriculum. 13 phases, ~165 lessons. Build production AI systems from scratch.",
    "url": "https://appliedaifromscratch.com/",
    "provider": {
      "@type": "Organization",
      "name": "The Pandan Labs"
    },
    "educationalLevel": "Advanced",
    "teaches": ["RAG", "AI Agents", "LLM Evaluation", "AI Observability", "Production AI Engineering"]
  }
  </script>

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />

  <!-- Syntax highlighting — two themes, toggled by JS -->
  <link id="hljs-dark" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css" />
  <link id="hljs-light" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" disabled />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>

  <!-- Mermaid diagrams -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

  <!-- Apply saved theme before first paint to prevent flash -->
  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      const prefer = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      const theme = saved || prefer;
      document.documentElement.setAttribute('data-theme', theme);
      if (theme === 'light') {
        document.addEventListener('DOMContentLoaded', function() {
          const d = document.getElementById('hljs-dark');
          const l = document.getElementById('hljs-light');
          if (d) d.disabled = true;
          if (l) l.disabled = false;
        });
      }
    })();
  </script>

  <!-- Apply saved/URL language + direction before first paint -->
  <script>
    (function() {
      const supported = ['en', 'ar'];
      const fromUrl = new URLSearchParams(window.location.search).get('lang');
      const saved = localStorage.getItem('lang');
      const lang = supported.includes(fromUrl) ? fromUrl
        : supported.includes(saved) ? saved : 'en';
      document.documentElement.setAttribute('lang', lang);
      document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
    })();
  </script>
</head>
<body>

<nav id="nav">
  <div class="nav-inner">
    <a href="#" class="nav-logo">
      applied<span class="logo-accent">ai</span>fromscratch
    </a>

      <a href="#phases" class="nav-link" data-i18n="navPhases">Phases</a>
      <button id="lang-toggle" class="theme-toggle" onclick="toggleLang()" aria-label="Switch language" title="English / العربية">
        <span class="lang-label">ع</span>
      </button>
      <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme" title="Toggle light/dark mode">
        <span class="theme-icon">☀</span>
      </button>
      <a href="https://github.com/thepandanlabs/applied-ai-from-scratch"
         target="_blank" rel="noopener" class="nav-github">
        GitHub ↗
      </a>
    </div>
  </div>
</nav>

<main id="app">

</main>

<footer class="site-footer">
  Built with ❤️ from 🇸🇦 Saudi Arabia
</footer>

<!-- Data + App -->
<script src="site/data.js"></script>
<script src="app.js"></script>
</body>
</html>
